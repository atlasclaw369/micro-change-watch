name: Start a Micro Change Watch
about: Request daily monitoring for public URLs
labels: ["watch-request"]
title: "Watch request: <your project/company>"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for requesting a Micro Change Watch. Public URLs only — no private dashboards, logins, credentials, personal data, captcha-heavy sites, or access-control bypassing.
  - type: input
    id: contact
    attributes:
      label: Public contact preference
      description: Use GitHub issue comments by default. Do not post email addresses, phone numbers, wallet addresses, private handles, credentials, or secrets.
      placeholder: "GitHub issue comments are fine"
    validations:
      required: true
  - type: dropdown
    id: plan
    attributes:
      label: Plan
      options:
        - "$9/month — Starter: 3 URLs"
        - "$19/month — Standard: 10 URLs"
        - "$10 one-off — 48-hour watch: 5 URLs"
        - "Not sure yet — please scope it"
    validations:
      required: true
  - type: textarea
    id: urls
    attributes:
      label: Public URLs to monitor
      description: One URL per line. Starter max 3, Standard max 10, 48-hour watch max 5. Public pages only.
      placeholder: |
        https://example.com/pricing
        https://example.com/changelog
        https://github.com/example/project/releases
    validations:
      required: true
  - type: textarea
    id: important_changes
    attributes:
      label: What changes matter?
      description: Tell me what to prioritize or ignore.
      placeholder: "Pricing changes, new release notes, plan limit changes, deprecated API docs, etc."
    validations:
      required: true
  - type: dropdown
    id: cadence
    attributes:
      label: Cadence
      options:
        - "Daily digest"
        - "Weekdays only"
        - "48-hour watch with daily updates"
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Confirm scope
      options:
        - label: These are public URLs that do not require login, cookies, private credentials, or bypassing access controls.
          required: true
        - label: I understand this is a concise monitoring digest, not legal/financial/trading advice.
          required: true
        - label: I understand URLs over the selected plan limit require upgrading or trimming scope before monitoring starts.
          required: true
